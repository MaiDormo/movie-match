<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#141414">
    <title>MovieMatch - Browse Movies</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/movie-list.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <a href="/" class="logo">Movie<span>Match</span></a>
            <div class="search-container">
                <select class="search-type" id="search-type">
                    <option value="title">Search by Title</option>
                    <option value="genre">Search by Genre</option>
                </select>
                <input type="text" placeholder="Search for a movie..." class="search-input" id="search-input">
                <button class="search-button" id="search-button">Search</button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Movie Grid -->
        <div class="movie-grid" id="movie-grid">
            <div class="loading-container" id="loading-spinner">
                <div class="loading-spinner"></div>
                <p class="loading-text">Loading movies...</p>
            </div>
        </div>

        <!-- Genres Sidebar -->
        <aside class="genres-sidebar">
            <div class="genres-card">
                <h2 class="genres-title">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21.41 11.58l-9-9C12.05 2.22 11.55 2 11 2H4c-1.1 0-2 .9-2 2v7c0 .55.22 1.05.59 1.42l9 9c.36.36.86.58 1.41.58.55 0 1.05-.22 1.41-.59l7-7c.37-.36.59-.86.59-1.41 0-.55-.23-1.06-.59-1.42zM5.5 7C4.67 7 4 6.33 4 5.5S4.67 4 5.5 4 7 4.67 7 5.5 6.33 7 5.5 7z"/></svg>
                    Favorite Genres
                </h2>
                <div class="genres-grid" id="genre-tags">
                    <!-- Dynamically generated -->
                </div>
                <button class="confirm-button" id="confirm-button">Confirm Choices</button>
            </div>
        </aside>
    </main>

    <script src="/static/js/movie-list.js"></script>
</body>
</html>
