<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f0f0f">
    <title>MovieMatch</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/movie-details.css">
</head>
<body>
    <header>
        <a href="/vibe" class="logo">MovieMatch</a>
        <a href="/vibe" class="back-link">Back</a>
    </header>

    <div class="container">
        <main>
            <section class="hero">
                <img id="poster" class="poster" alt="Movie poster">
                <div class="hero-info">
                    <h1 id="title">Loading...</h1>
                    <div id="hero-meta" class="hero-meta"></div>
                    <div id="tags" class="tags"></div>
                    <p id="plot" class="plot"></p>
                </div>
            </section>

            <section id="trailer-section" hidden>
                <h2>Trailer</h2>
                <div class="video-wrap">
                    <iframe id="youtube-frame" title="Movie trailer" loading="lazy" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                </div>
            </section>

            <section id="trivia-section" hidden>
                <h2>Trivia</h2>
                <p id="trivia-question" class="trivia-question"></p>
                <div id="trivia-options" class="trivia-options"></div>
                <p id="trivia-feedback" class="trivia-feedback"></p>
            </section>

            <section id="streaming-section" hidden>
                <h2>Where to Watch</h2>
                <div id="streaming-content" class="streaming-grid"></div>
            </section>

            <section id="spotify-section" hidden>
                <h2>Soundtrack</h2>
                <a id="spotify-link" class="spotify-card" target="_blank" rel="noopener noreferrer">
                    <img id="spotify-cover" class="spotify-cover" alt="Spotify cover">
                    <div>
                        <p id="spotify-title" class="spotify-title">No playlist found</p>
                        <p id="spotify-subtitle" class="spotify-subtitle">Listen on Spotify</p>
                    </div>
                </a>
            </section>
        </main>

        <div id="loading-state" class="loading">
            <div class="spinner"></div>
            <p>Loading...</p>
        </div>

        <div id="details-page" hidden>
            <!-- populated by JS -->
        </div>

        <section id="error-state" class="error-state" hidden>
            <h1>Something went wrong</h1>
            <p id="error-message"></p>
            <a href="/vibe" class="back-link">Go back</a>
        </section>
    </div>

    <script src="/static/js/movie-details.js"></script>
</body>
</html>
